<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLSN // ACCESS GATEWAY</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #080c10;
            --bg-panel: #0d1217;
            --bg-input: #05070a;
            --border-color: rgba(255, 255, 255, 0.07);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            
            --accent-cyan: #00ffd1;
            --color-live: #00ffd1;
            --color-dead: #ff3e6c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            background-image: radial-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background-color: rgba(13, 18, 23, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.35);
            transition: border-color 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-card:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }

        .login-header {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #fff;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .login-header span {
            color: var(--accent-cyan);
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: rgba(0, 255, 209, 0.07);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .tab-btn:hover:not(.active) {
            border-color: var(--border-hover);
            color: #fff;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 6px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px 12px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--accent-cyan);
        }

        .btn {
            width: 100%;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.8rem;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid transparent;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
            color: #080c10;
            background-color: var(--accent-cyan);
            margin-top: 10px;
        }

        .btn:hover {
            box-shadow: 0 0 15px rgba(0, 255, 209, 0.4);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .telegram-widget-container {
            display: flex;
            justify-content: center;
            padding: 20px 0;
            background-color: var(--bg-input);
            border: 1px dashed var(--border-color);
            border-radius: 4px;
        }

        /* Notifications Box */
        .noti-box {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .noti {
            pointer-events: auto;
            width: 320px;
            padding: 12px 16px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            animation: slideIn 0.25s cubic-bezier(0.16, 1, 0.3, 1), fadeOut 0.25s ease 2.7s forwards;
            color: #fff;
            background-color: var(--bg-panel);
            border-left: 3px solid transparent;
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(10px); }
        }

        .noti.ok { border-left-color: var(--color-live); }
        .noti.err { border-left-color: var(--color-dead); }

        .dev-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--color-dead);
            background-color: rgba(255, 62, 108, 0.1);
            border: 1px solid rgba(255, 62, 108, 0.2);
            padding: 2px 6px;
            border-radius: 2px;
            display: inline-block;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <span>&gt;_</span> GATEWAY SIGN IN
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('client')">TELEGRAM ACCESS</button>
        <button class="tab-btn" id="admin-tab" onclick="switchTab('admin')">ADMIN PORTAL</button>
    </div>

    <!-- Regular User Telegram Login tab -->
    <div class="tab-content active" id="tab-client">
        {% if bot_username %}
        <div class="telegram-widget-container">
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-login="{{ bot_username }}" 
                    data-size="large" 
                    data-auth-url="/api/login/telegram" 
                    data-request-access="write"></script>
        </div>
        {% else %}
        <div class="dev-badge"><i class="fa-solid fa-code"></i> Dev Fallback Mode</div>
        <div class="form-group">
            <label for="mock-username">Telegram Username</label>
            <input type="text" id="mock-username" placeholder="@yourusername">
        </div>
        <button class="btn" onclick="mockLogin()"><i class="fa-solid fa-paper-plane"></i> LOG IN VIA TELEGRAM</button>
        {% endif %}
    </div>

    <!-- Admin Portal login tab -->
    <div class="tab-content" id="tab-admin">
        <div class="form-group">
            <label for="admin-user">Admin Username</label>
            <input type="text" id="admin-user" placeholder="Enter username...">
        </div>
        <div class="form-group">
            <label for="admin-pass">Access Password</label>
            <input type="password" id="admin-pass" placeholder="Enter password...">
        </div>
        <button class="btn" onclick="adminLogin()"><i class="fa-solid fa-shield-halved"></i> AUTHENTICATE</button>
    </div>
</div>

<div class="noti-box" id="noti-box"></div>

<script>
// Check URL parameters on load to auto switch tabs
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('admin') === '1') {
        switchTab('admin');
    }
}

function switchTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

    if (tabId === 'client') {
        document.querySelector('.tab-btn:first-child').classList.add('active');
        document.getElementById('tab-client').classList.add('active');
    } else {
        document.getElementById('admin-tab').classList.add('active');
        document.getElementById('tab-admin').classList.add('active');
    }
}

async function mockLogin() {
    const input = document.getElementById('mock-username');
    const username = input.value.trim();
    if (!username) {
        noti('Username cannot be empty', 1);
        return;
    }

    try {
        const response = await fetch('/api/login/mock', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username })
        });
        const data = await response.json();
        if (data.error) {
            noti(data.error.toUpperCase(), 1);
        } else {
            noti('Authorized successfully');
            setTimeout(() => {
                window.location.href = data.redirect;
            }, 500);
        }
    } catch (e) {
        noti('Authorization request failed', 1);
    }
}

async function adminLogin() {
    const userEl = document.getElementById('admin-user');
    const passEl = document.getElementById('admin-pass');
    const username = userEl.value.trim();
    const password = passEl.value.trim();

    if (!username || !password) {
        noti('Username and password are required', 1);
        return;
    }

    try {
        const response = await fetch('/api/login/admin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, password: password })
        });
        
        if (!response.ok) {
            noti('Authentication failed', 1);
            return;
        }

        const data = await response.json();
        noti('Authentication successful');
        setTimeout(() => {
            window.location.href = data.redirect;
        }, 500);
    } catch (e) {
        noti('Server authentication request failed', 1);
    }
}

function noti(m, e) {
    const box = document.getElementById('noti-box');
    const n = document.createElement('div');
    n.className = 'noti ' + (e ? 'err' : 'ok');
    
    const iconStr = e ? '<i class="fa-solid fa-triangle-exclamation" style="color:var(--color-dead)"></i>' : '<i class="fa-solid fa-circle-info" style="color:var(--accent-cyan)"></i>';
    n.innerHTML = `${iconStr} <span>${m}</span>`;
    
    box.appendChild(n);
    setTimeout(() => n.remove(), 3000);
}
</script>
</body>
</html>
