<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLSN Web Checker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#06060c;color:#e0e0e0;min-height:100vh}
        .glow{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(59,130,246,.07) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(168,85,247,.05) 0%,transparent 50%);pointer-events:none;z-index:0}
        .wrap{max-width:1280px;margin:0 auto;padding:20px;position:relative;z-index:1}
        header{text-align:center;margin-bottom:24px}
        header h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        header p{color:#6b7280;font-size:.85rem;margin-top:4px}
        .stats{display:flex;gap:10px;margin-bottom:20px}
        .stat{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px 16px;flex:1;text-align:center}
        .stat .v{font-size:1.4rem;font-weight:700;color:#fff}
        .stat .l{font-size:.7rem;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
        @media(max-width:768px){.grid{grid-template-columns:1fr}}
        .panel{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:20px}
        .ptitle{font-size:.75rem;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
        .drop{border:2px dashed rgba(59,130,246,.25);border-radius:10px;padding:32px 16px;text-align:center;cursor:pointer;transition:.2s}
        .drop:hover,.drop.over{border-color:rgba(59,130,246,.5);background:rgba(59,130,246,.04)}
        .drop .ic{font-size:2rem;margin-bottom:8px}
        .drop .tx{color:#9ca3af;font-size:.85rem}
        .drop .st{color:#4b5563;font-size:.75rem;margin-top:4px}
        .drop input{display:none}
        textarea{width:100%;min-height:100px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:12px;color:#e0e0e0;font-family:'SF Mono',monospace;font-size:.82rem;resize:vertical;outline:none}
        textarea:focus{border-color:rgba(59,130,246,.4)}
        textarea::placeholder{color:#374151}
        .modes{display:flex;gap:6px;margin-bottom:12px}
        .mbtn{flex:1;padding:8px;border:1px solid rgba(255,255,255,.07);border-radius:8px;background:rgba(255,255,255,.02);color:#9ca3af;font-size:.8rem;font-weight:500;cursor:pointer;transition:.15s}
        .mbtn.on{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.35);color:#60a5fa}
        .mbtn:hover{border-color:rgba(255,255,255,.12)}
        .gbtn{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;font-size:.9rem;font-weight:600;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
        .gbtn:hover{box-shadow:0 6px 20px rgba(59,130,246,.3);transform:translateY(-1px)}
        .gbtn:disabled{opacity:.4;cursor:not-allowed;transform:none}
        .gbtn .sp{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px}
        .gbtn.load .sp{display:inline-block}
        @keyframes spin{to{transform:rotate(360deg)}}
        .full{grid-column:1/-1}
        .rheader{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
        .rbadges{display:flex;gap:6px;flex-wrap:wrap}
        .rb{padding:4px 10px;border-radius:6px;font-size:.72rem;font-weight:600;cursor:pointer;transition:.15s}
        .rb.live{background:rgba(34,197,94,.12);color:#22c55e}
        .rb.dead{background:rgba(239,68,68,.12);color:#ef4444}
        .rb.err{background:rgba(234,179,8,.12);color:#eab308}
        .rb.otp{background:rgba(59,130,246,.12);color:#3b82f6}
        .rb.low{background:rgba(168,85,247,.12);color:#a855f7}
        .rb.sel{outline:2px solid rgba(255,255,255,.3);outline-offset:-2px;cursor:pointer}
        .rlist{max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
        .rlist::-webkit-scrollbar{width:5px}
        .rlist::-webkit-scrollbar-track{background:transparent}
        .rlist::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
        .ri{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.04);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px;animation:fadeIn .25s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .ri:hover{border-color:rgba(255,255,255,.08)}
        .ri .em{font-size:1.2rem;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:7px;flex-shrink:0}
        .ri.LIVE .em{background:rgba(34,197,94,.1)}
        .ri.DEAD .em{background:rgba(239,68,68,.1)}
        .ri.ERROR .em,.ri.TIMEOUT .em{background:rgba(234,179,8,.1)}
        .ri.OTP_REQUIRED .em{background:rgba(59,130,246,.1)}
        .ri.LOW_BALANCE .em{background:rgba(168,85,247,.1)}
        .ri.EXCEPTION .em{background:rgba(239,68,68,.1)}
        .ri .info{flex:1;min-width:0}
        .ri .cc{font-family:monospace;font-size:.82rem;color:#e0e0e0;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .ri .det{font-size:.73rem;color:#6b7280;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
        .sb{display:inline-block;padding:1px 6px;border-radius:3px;font-size:.65rem;font-weight:600}
        .sb.LIVE{background:rgba(34,197,94,.18);color:#22c55e}
        .sb.DEAD{background:rgba(239,68,68,.18);color:#ef4444}
        .sb.ERROR,.sb.TIMEOUT,.sb.EXCEPTION{background:rgba(234,179,8,.18);color:#eab308}
        .sb.OTP_REQUIRED{background:rgba(59,130,246,.18);color:#3b82f6}
        .sb.LOW_BALANCE{background:rgba(168,85,247,.18);color:#a855f7}
        .sb.UNKNOWN{background:rgba(107,114,128,.18);color:#6b7280}
        .ri .meta{text-align:right;flex-shrink:0}
        .ri .price{font-size:.82rem;font-weight:600;color:#22c55e}
        .ri .site{font-size:.65rem;color:#4b5563;max-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .pool{margin-bottom:20px}
        .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        @media(max-width:768px){.pgrid{grid-template-columns:1fr}}
        .pacts{display:flex;gap:6px;margin-bottom:10px}
        .pbtn{padding:7px 12px;border:1px solid rgba(255,255,255,.08);border-radius:7px;background:rgba(255,255,255,.03);color:#d1d5db;font-size:.75rem;cursor:pointer;transition:.15s}
        .pbtn:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12)}
        .pbtn.d{border-color:rgba(239,68,68,.25);color:#ef4444}
        .pbtn.d:hover{background:rgba(239,68,68,.08)}
        .plist{max-height:160px;overflow-y:auto}
        .plist::-webkit-scrollbar{width:4px}
        .plist::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}
        .empty{text-align:center;padding:20px;color:#4b5563;font-size:.82rem}
        .progress{height:3px;background:rgba(255,255,255,.04);border-radius:2px;margin-bottom:12px;overflow:hidden;display:none}
        .progress.on{display:block}
        .progress .fill{height:100%;background:linear-gradient(90deg,#3b82f6,#a855f7);border-radius:2px;transition:width .3s;width:0%}
        footer{text-align:center;padding:16px;color:#1f2937;font-size:.75rem}
        .noti{position:fixed;top:16px;right:16px;padding:10px 16px;border-radius:8px;font-size:.8rem;font-weight:500;z-index:1000;animation:slideIn .3s ease,fadeOut .3s ease 2.7s}
        .noti.ok{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);color:#22c55e}
        .noti.err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#ef4444}
        @keyframes slideIn{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
        @keyframes fadeOut{to{opacity:0}}
    </style>
</head>
<body>
<div class="glow"></div>
<div class="wrap">
    <header>
        <h1>MLSN Web Checker</h1>
        <p>Shopify Card Checker &mdash; Random Site & Proxy</p>
    </header>

    <div class="stats">
        <div class="stat"><div class="v" id="sS">-</div><div class="l">Sites</div></div>
        <div class="stat"><div class="v" id="sP">-</div><div class="l">Proxies</div></div>
        <div class="stat"><div class="v" id="sA">-</div><div class="l">API</div></div>
    </div>

    <div class="grid">
        <div class="panel">
            <div class="ptitle"><span>&#128203;</span> Card Input</div>
            <div class="modes">
                <button class="mbtn on" data-m="sac" onclick="setM(this,'sac')">SAC Single</button>
                <button class="mbtn" data-m="msac" onclick="setM(this,'msac')">MSAC Mass</button>
            </div>
            <textarea id="ci" placeholder="cc|mm|yy|cvv&#10;cc/mm/yy/cvv&#10;cc mm yy cvv&#10;&#10;One card per line"></textarea>
            <div style="margin-top:12px">
                <button class="gbtn" id="cb" onclick="go()"><span class="sp"></span>Check Cards</button>
            </div>
        </div>
        <div class="panel">
            <div class="ptitle"><span>&#128193;</span> File Upload</div>
            <div class="drop" id="dz">
                <div class="ic">&#128194;</div>
                <div class="tx">Drag & drop .txt file</div>
                <div class="st">or click to browse &mdash; max 200MB</div>
                <input type="file" id="fi" accept=".txt,.csv">
            </div>
            <div id="fi2" style="margin-top:10px;font-size:.82rem;color:#6b7280"></div>
        </div>
        <div class="panel full" id="rp" style="display:none">
            <div class="rheader">
                <div class="ptitle" style="margin:0"><span>&#128202;</span> Results</div>
                <div class="rbadges" id="rs"></div>
            </div>
            <div class="progress" id="pb"><div class="fill" id="pf"></div></div>
            <div class="rlist" id="rl"></div>
        </div>
    </div>

    <div class="pool">
        <div class="pgrid">
            <div class="panel">
                <div class="ptitle"><span>&#127760;</span> Sites Pool</div>
                <div class="pacts">
                    <label class="pbtn" style="cursor:pointer">Upload .txt<input type="file" id="sf" accept=".txt,.csv" style="display:none" onchange="upS(this.files[0])"></label>
                    <button class="pbtn d" onclick="clrS()">Clear</button>
                </div>
                <div class="plist" id="sl"><div class="empty" id="sli">Loading...</div></div>
            </div>
            <div class="panel">
                <div class="ptitle"><span>&#128274;</span> Proxies Pool</div>
                <div class="pacts">
                    <label class="pbtn" style="cursor:pointer">Upload .txt<input type="file" id="pf2" accept=".txt,.csv" style="display:none" onchange="upP(this.files[0])"></label>
                    <button class="pbtn d" onclick="clrP()">Clear</button>
                </div>
                <div class="plist" id="pl"><div class="empty" id="pli">Loading...</div></div>
            </div>
        </div>
    </div>
    <footer>MLSN Web Checker</footer>
</div>
<script>
let mode='sac',upFile=null,allResults=[],activeFilter=null;
function setM(b,m){mode=m;document.querySelectorAll('.mbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on')}
async function stats(){try{const r=await fetch('/api/stats');const d=await r.json();document.getElementById('sS').textContent=d.sites_count;document.getElementById('sP').textContent=d.proxies_count;document.getElementById('sA').textContent='Online';document.getElementById('sA').style.color='#22c55e';document.getElementById('sli').textContent=d.sites_count+' sites loaded';document.getElementById('pli').textContent=d.proxies_count+' proxies loaded'}catch(e){document.getElementById('sA').textContent='Error';document.getElementById('sA').style.color='#ef4444'}}
function go(){
    const cards=document.getElementById('ci').value.trim();
    const btn=document.getElementById('cb');
    if(!cards&&!upFile){noti('No cards',1);return}
    btn.classList.add('load');btn.disabled=true;
    document.getElementById('pb').classList.add('on');document.getElementById('pf').style.width='0%';
    document.getElementById('rp').style.display='block';document.getElementById('rl').innerHTML='';
    allResults=[];activeFilter=null;

    let es;
    if(upFile){
        const fd=new FormData();fd.append('file',upFile);fd.append('mode',mode);
        fetch('/api/check/upload',{method:'POST',body:fd}).then(r=>{es=new EventSource('/api/check/upload');}).catch(()=>{});
        const fd2=new FormData();fd2.append('file',upFile);fd2.append('mode',mode);
        fetch('/api/check/upload',{method:'POST',body:fd2}).then(r=>r.text()).then(t=>{
            const lines=t.split('\n').filter(l=>l.startsWith('data: '));
            lines.forEach(l=>{try{handleMsg(JSON.parse(l.slice(6)))}catch(e){}});
        });
    }else{
        fetch('/api/check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cards,mode})}).then(r=>{
            const reader=r.body.getReader();const dec=new TextDecoder();let buf='';
            function read(){reader.read().then(({done,value})=>{
                if(done){finish();return}
                buf+=dec.decode(value,{stream:true});
                const parts=buf.split('\n\n');buf=parts.pop();
                parts.forEach(p=>{const m=p.trim();if(m.startsWith('data: '))try{handleMsg(JSON.parse(m.slice(6)))}catch(e){}});
                read();
            })}
            read();
        });
    }
}
function handleMsg(d){
    if(d.type==='batch'){
        allResults=allResults.concat(d.results);
        const pct=Math.round((d.done/d.total_cards)*100);
        document.getElementById('pf').style.width=pct+'%';
        showR(d.stats);
    }else if(d.type==='done'){
        document.getElementById('pf').style.width='100%';
        showR(d.stats);
        noti('Done: '+d.stats.total+' cards');
        document.getElementById('cb').classList.remove('load');document.getElementById('cb').disabled=false;
        setTimeout(()=>document.getElementById('pb').classList.remove('on'),400);
    }
}
function showR(st){
    document.getElementById('rs').innerHTML=`
        <span class="rb live${activeFilter==='LIVE'?' sel':''}" onclick="filterR('LIVE')">LIVE ${st.live}</span>
        <span class="rb dead${activeFilter==='DEAD'?' sel':''}" onclick="filterR('DEAD')">DEAD ${st.dead}</span>
        <span class="rb otp${activeFilter==='OTP_REQUIRED'?' sel':''}" onclick="filterR('OTP_REQUIRED')">OTP ${st.otp}</span>
        <span class="rb low${activeFilter==='LOW_BALANCE'?' sel':''}" onclick="filterR('LOW_BALANCE')">LOW ${st.low_balance}</span>
        <span class="rb err${activeFilter==='ERR'?' sel':''}" onclick="filterR('ERR')">ERR ${st.error}</span>
        <span class="rb${activeFilter===null?' sel':''}" onclick="filterR(null)">ALL ${st.total||allResults.length}</span>`;
    const filtered=activeFilter?allResults.filter(r=>{
        if(activeFilter==='ERR')return r.status==='ERROR'||r.status==='TIMEOUT'||r.status==='EXCEPTION';
        return r.status===activeFilter;
    }):allResults;
    document.getElementById('rl').innerHTML=filtered.map((r,i)=>`<div class="ri ${r.status}"><div class="em">${r.emoji}</div><div class="info"><div class="cc">${esc(r.card)}</div><div class="det"><span class="sb ${r.status}">${r.status}</span>${esc(r.msg)}</div><div class="det" style="margin-top:2px;color:#374151;font-size:.68rem">${esc(r.gateway)} | ${esc(r.receipt_id)} | ${esc(r.time)}s</div></div><div class="meta"><div class="price">${esc(r.price)}</div><div class="site">${esc(r.site)}</div></div></div>`).join('');
}
function filterR(f){activeFilter=f;showR({live:allResults.filter(r=>r.status==='LIVE').length,dead:allResults.filter(r=>r.status==='DEAD').length,otp:allResults.filter(r=>r.status==='OTP_REQUIRED').length,low_balance:allResults.filter(r=>r.status==='LOW_BALANCE').length,error:allResults.filter(r=>['ERROR','TIMEOUT','EXCEPTION'].includes(r.status)).length,total:allResults.length})}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function noti(m,e){const n=document.createElement('div');n.className='noti '+(e?'err':'ok');n.textContent=m;document.body.appendChild(n);setTimeout(()=>n.remove(),3000)}
const dz=document.getElementById('dz'),fi=document.getElementById('fi');
dz.onclick=()=>fi.click();
dz.ondragover=e=>{e.preventDefault();dz.classList.add('over')};
dz.ondragleave=()=>dz.classList.remove('over');
dz.ondrop=e=>{e.preventDefault();dz.classList.remove('over');if(e.dataTransfer.files[0])fFile(e.dataTransfer.files[0])};
fi.onchange=e=>{if(e.target.files[0])fFile(e.target.files[0])};
function fFile(f){upFile=f;document.getElementById('fi2').textContent='Loaded: '+f.name;noti('File: '+f.name)}
document.getElementById('ci').onpaste=()=>{upFile=null;document.getElementById('fi2').textContent=''}
async function upS(f){if(!f)return;const fd=new FormData();fd.append('file',f);try{const r=await fetch('/api/sites/upload',{method:'POST',body:fd});const d=await r.json();if(d.error){noti(d.error,1);return}noti('Loaded '+d.loaded+' sites');stats()}catch(e){noti('Error',1)}}
async function upP(f){if(!f)return;const fd=new FormData();fd.append('file',f);try{const r=await fetch('/api/proxies/upload',{method:'POST',body:fd});const d=await r.json();if(d.error){noti(d.error,1);return}noti('Loaded '+d.loaded+' proxies');stats()}catch(e){noti('Error',1)}}
async function clrS(){await fetch('/api/sites/clear',{method:'POST'});noti('Sites cleared');stats()}
async function clrP(){await fetch('/api/proxies/clear',{method:'POST'});noti('Proxies cleared');stats()}
stats();
</script>
</body>
</html>
