<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLSN Web Checker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(236, 72, 153, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
            padding: 32px 0;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        header p {
            color: #6b7280;
            margin-top: 8px;
            font-size: 0.95rem;
        }

        .stats-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 14px 20px;
            flex: 1;
            min-width: 120px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        .stat-card .label {
            font-size: 0.75rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
        }

        .panel {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 24px;
        }

        .panel-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title .icon {
            font-size: 1rem;
        }

        .drop-zone {
            border: 2px dashed rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(59, 130, 246, 0.02);
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: rgba(59, 130, 246, 0.6);
            background: rgba(59, 130, 246, 0.06);
        }

        .drop-zone .icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .drop-zone .text {
            color: #9ca3af;
            font-size: 0.9rem;
        }

        .drop-zone .subtext {
            color: #4b5563;
            font-size: 0.8rem;
            margin-top: 6px;
        }

        .drop-zone input[type="file"] {
            display: none;
        }

        .card-input {
            width: 100%;
            min-height: 120px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 14px;
            color: #e0e0e0;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        .card-input:focus {
            border-color: rgba(59, 130, 246, 0.5);
        }

        .card-input::placeholder {
            color: #4b5563;
        }

        .mode-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            background: rgba(255,255,255,0.02);
            color: #9ca3af;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.4);
            color: #60a5fa;
        }

        .mode-btn:hover {
            border-color: rgba(255,255,255,0.15);
        }

        .btn-check {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-check:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
        }

        .btn-check:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-check .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        .btn-check.loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .results-panel {
            grid-column: 1 / -1;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .result-stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .result-stat {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .result-stat.live { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .result-stat.dead { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .result-stat.error { background: rgba(234, 179, 8, 0.15); color: #eab308; }
        .result-stat.otp { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .result-stat.low { background: rgba(168, 85, 247, 0.15); color: #a855f7; }

        .results-list {
            max-height: 500px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .results-list::-webkit-scrollbar {
            width: 6px;
        }

        .results-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.02);
            border-radius: 3px;
        }

        .results-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }

        .result-item {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item:hover {
            border-color: rgba(255,255,255,0.1);
        }

        .result-item .emoji {
            font-size: 1.3rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .result-item.status-LIVE .emoji { background: rgba(34, 197, 94, 0.12); }
        .result-item.status-DEAD .emoji { background: rgba(239, 68, 68, 0.12); }
        .result-item.status-ERROR .emoji { background: rgba(234, 179, 8, 0.12); }
        .result-item.status-OTP_REQUIRED .emoji { background: rgba(59, 130, 246, 0.12); }
        .result-item.status-LOW_BALANCE .emoji { background: rgba(168, 85, 247, 0.12); }
        .result-item.status-TIMEOUT .emoji { background: rgba(107, 114, 128, 0.12); }

        .result-info {
            flex: 1;
            min-width: 0;
        }

        .result-card {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            color: #e0e0e0;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-detail {
            font-size: 0.78rem;
            color: #6b7280;
        }

        .result-detail .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-right: 6px;
        }

        .status-badge.LIVE { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .status-badge.DEAD { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .status-badge.ERROR { background: rgba(234, 179, 8, 0.2); color: #eab308; }
        .status-badge.OTP_REQUIRED { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .status-badge.LOW_BALANCE { background: rgba(168, 85, 247, 0.2); color: #a855f7; }
        .status-badge.TIMEOUT { background: rgba(107, 114, 128, 0.2); color: #6b7280; }

        .result-meta {
            text-align: right;
            flex-shrink: 0;
        }

        .result-price {
            font-size: 0.85rem;
            font-weight: 600;
            color: #22c55e;
        }

        .result-site {
            font-size: 0.7rem;
            color: #4b5563;
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pool-section {
            margin-top: 24px;
        }

        .pool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .pool-grid { grid-template-columns: 1fr; }
        }

        .pool-input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.85rem;
            outline: none;
            margin-bottom: 10px;
        }

        .pool-input:focus {
            border-color: rgba(59, 130, 246, 0.4);
        }

        .pool-actions {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            padding: 8px 14px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            color: #d1d5db;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-sm:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.15);
        }

        .btn-sm.danger {
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .btn-sm.danger:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .pool-list {
            max-height: 150px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .pool-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            color: #9ca3af;
            transition: background 0.15s;
        }

        .pool-item:hover {
            background: rgba(255,255,255,0.03);
        }

        .pool-item .url {
            font-family: 'SF Mono', monospace;
            font-size: 0.75rem;
            max-width: 280px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pool-item .remove-btn {
            background: none;
            border: none;
            color: #4b5563;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .pool-item .remove-btn:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 24px;
            color: #4b5563;
            font-size: 0.85rem;
        }

        .progress-bar {
            height: 3px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            margin-bottom: 16px;
            overflow: hidden;
            display: none;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #a855f7);
            border-radius: 2px;
            transition: width 0.3s ease;
            width: 0%;
        }

        footer {
            text-align: center;
            padding: 24px;
            color: #374151;
            font-size: 0.8rem;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        .notification.error {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="container">
        <header>
            <h1>MLSN Web Checker</h1>
            <p>Shopify Card Checker with Random Site & Proxy</p>
        </header>

        <div class="stats-bar" id="statsBar">
            <div class="stat-card">
                <div class="value" id="statSites">-</div>
                <div class="label">Sites</div>
            </div>
            <div class="stat-card">
                <div class="value" id="statProxies">-</div>
                <div class="label">Proxies</div>
            </div>
            <div class="stat-card">
                <div class="value" id="statApi">-</div>
                <div class="label">API Status</div>
            </div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <div class="panel-title">
                    <span class="icon">📋</span> Card Input
                </div>
                
                <div class="mode-toggle">
                    <button class="mode-btn active" data-mode="sac" onclick="setMode('sac')">SAC (Single)</button>
                    <button class="mode-btn" data-mode="msac" onclick="setMode('msac')">MSAC (Mass)</button>
                </div>

                <textarea class="card-input" id="cardInput" 
                    placeholder="Paste cards here (one per line)&#10;Format: cc|mm|yy|cvv&#10;or: cc/mm/yy/cvv&#10;&#10;Max 200 cards per batch"></textarea>

                <div style="margin-top: 16px;">
                    <button class="btn-check" id="btnCheck" onclick="startCheck()">
                        <span class="spinner"></span>
                        <span>Check Cards</span>
                    </button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">
                    <span class="icon">📁</span> File Upload
                </div>
                
                <div class="drop-zone" id="dropZone">
                    <div class="icon">📂</div>
                    <div class="text">Drag & drop .txt file here</div>
                    <div class="subtext">Max 200MB file size</div>
                    <input type="file" id="fileInput" accept=".txt,.csv">
                </div>

                <div id="fileInfo" style="margin-top: 12px; font-size: 0.85rem; color: #6b7280;"></div>
            </div>

            <div class="panel results-panel" id="resultsPanel" style="display: none;">
                <div class="results-header">
                    <div class="panel-title" style="margin-bottom: 0;">
                        <span class="icon">📊</span> Results
                    </div>
                    <div class="result-stats" id="resultStats"></div>
                </div>

                <div class="progress-bar" id="progressBar">
                    <div class="fill" id="progressFill"></div>
                </div>

                <div class="results-list" id="resultsList"></div>
            </div>
        </div>

        <div class="pool-section">
            <div class="pool-grid">
                <div class="panel">
                    <div class="panel-title">
                        <span class="icon">🌐</span> Sites Pool (from Admin DB)
                    </div>
                    <div class="pool-list" id="sitesList" style="max-height:200px;overflow-y:auto;"></div>
                </div>

                <div class="panel">
                    <div class="panel-title">
                        <span class="icon">🔒</span> Proxies Pool (from Admin DB)
                    </div>
                    <div class="pool-list" id="proxiesList" style="max-height:200px;overflow-y:auto;"></div>
                </div>
            </div>
        </div>

        <footer>
            MLSN Web Checker &mdash; Standalone Interface
        </footer>
    </div>

    <script>
        let currentMode = 'sac';
        let uploadedFile = null;

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
        }

        async function loadStats() {
            try {
                const resp = await fetch('/api/stats');
                const data = await resp.json();
                document.getElementById('statSites').textContent = data.sites_count;
                document.getElementById('statProxies').textContent = data.proxies_count;
                document.getElementById('statApi').textContent = 'Online';
            } catch (e) {
                document.getElementById('statApi').textContent = 'Error';
            }
        }

        async function loadSites() {
            try {
                const resp = await fetch('/api/stats');
                const data = await resp.json();
                document.getElementById('sitesList').innerHTML = `<div class="empty-state">${data.sites_count} sites loaded from Admin DB</div>`;
            } catch (e) {}
        }

        async function loadProxies() {
            try {
                const resp = await fetch('/api/stats');
                const data = await resp.json();
                document.getElementById('proxiesList').innerHTML = `<div class="empty-state">${data.proxies_count} proxies loaded from Admin DB</div>`;
            } catch (e) {}
        }

        async function startCheck() {
            const cards = document.getElementById('cardInput').value.trim();
            const btn = document.getElementById('btnCheck');
            
            if (!cards && !uploadedFile) {
                showNotification('Please paste cards or upload a file', true);
                return;
            }

            btn.classList.add('loading');
            btn.disabled = true;
            document.getElementById('progressBar').classList.add('active');
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('resultsPanel').style.display = 'block';
            document.getElementById('resultsList').innerHTML = '';

            try {
                let resp;
                
                if (uploadedFile) {
                    const formData = new FormData();
                    formData.append('file', uploadedFile);
                    formData.append('mode', currentMode);
                    resp = await fetch('/api/check/upload', {
                        method: 'POST',
                        body: formData
                    });
                } else {
                    resp = await fetch('/api/check', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ cards, mode: currentMode })
                    });
                }

                const data = await resp.json();
                
                if (data.error) {
                    showNotification(data.error, true);
                    return;
                }

                document.getElementById('progressFill').style.width = '100%';
                
                displayResults(data.results, data.stats);
                showNotification(`Checked ${data.stats.total} cards`);
                
            } catch (e) {
                showNotification('Error checking cards: ' + e.message, true);
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
                setTimeout(() => {
                    document.getElementById('progressBar').classList.remove('active');
                }, 500);
            }
        }

        function displayResults(results, stats) {
            const statsHtml = `
                <span class="result-stat live">LIVE: ${stats.live}</span>
                <span class="result-stat dead">DEAD: ${stats.dead}</span>
                <span class="result-stat otp">OTP: ${stats.otp}</span>
                <span class="result-stat low">LOW: ${stats.low_balance}</span>
                <span class="result-stat error">ERR: ${stats.error}</span>
            `;
            document.getElementById('resultStats').innerHTML = statsHtml;

            const list = document.getElementById('resultsList');
            list.innerHTML = results.map((r, i) => `
                <div class="result-item status-${r.status}" style="animation-delay: ${i * 0.05}s">
                    <div class="emoji">${r.emoji}</div>
                    <div class="result-info">
                        <div class="result-card">${escHtml(r.card)}</div>
                        <div class="result-detail">
                            <span class="status-badge ${r.status}">${r.status}</span>
                            ${escHtml(r.msg)}
                        </div>
                        <div class="result-detail" style="margin-top:3px;color:#6b7280;font-size:0.75rem;">
                            ${escHtml(r.gateway)} | ${escHtml(r.receipt_id)} | ${escHtml(r.time)}s
                        </div>
                    </div>
                    <div class="result-meta">
                        <div class="result-price">${escHtml(r.price)}</div>
                        <div class="result-site">${escHtml(r.site)}</div>
                    </div>
                </div>
            `).join('');
        }

        function escHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        function escAttr(str) {
            return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        function showNotification(msg, isError = false) {
            const n = document.createElement('div');
            n.className = 'notification' + (isError ? ' error' : '');
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        fileInput.addEventListener('change', e => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            uploadedFile = file;
            document.getElementById('fileInfo').textContent = `Selected: ${file.name}`;
            showNotification(`File loaded: ${file.name}`);
        }

        document.getElementById('cardInput').addEventListener('paste', () => {
            uploadedFile = null;
            document.getElementById('fileInfo').textContent = '';
        });

        loadStats();
        loadSites();
        loadProxies();
    </script>
</body>
</html>
